<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOps Task Manager | AWS ECS & Terraform Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="header-brand">
        <div class="logo-icon">⚡</div>
        <div>
          <h1>DevOps Task Manager</h1>
          <p class="subtitle">AWS ECS Fargate • Terraform • Docker • GitHub Actions</p>
        </div>
      </div>
      <div class="system-status" id="system-status">
        <span class="status-dot pulsing"></span>
        <span id="status-text">Checking System Health...</span>
      </div>
    </header>

    <main class="main-content">
      <!-- Create Task Card -->
      <section class="card create-card">
        <h2>Create New Task</h2>
        <form id="task-form" class="task-form">
          <div class="form-group">
            <label for="task-title">Title</label>
            <input type="text" id="task-title" placeholder="e.g. Deploy ECS cluster via Terraform" required>
          </div>
          <div class="form-group">
            <label for="task-desc">Description</label>
            <textarea id="task-desc" placeholder="Details about this DevOps task..." rows="2"></textarea>
          </div>
          <div class="form-row">
            <div class="form-group half">
              <label for="task-status">Initial Status</label>
              <select id="task-status">
                <option value="todo">To Do</option>
                <option value="in-progress">In Progress</option>
                <option value="done">Done</option>
              </select>
            </div>
            <div class="form-group half btn-group">
              <button type="submit" class="btn btn-primary">Add Task</button>
            </div>
          </div>
        </form>
      </section>

      <!-- Task Lists Grid -->
      <section class="board-grid">
        <!-- Todo Column -->
        <div class="column">
          <div class="column-header todo-header">
            <h3>To Do <span class="badge" id="count-todo">0</span></h3>
          </div>
          <div class="task-list" id="list-todo"></div>
        </div>

        <!-- In Progress Column -->
        <div class="column">
          <div class="column-header progress-header">
            <h3>In Progress <span class="badge" id="count-in-progress">0</span></h3>
          </div>
          <div class="task-list" id="list-in-progress"></div>
        </div>

        <!-- Done Column -->
        <div class="column">
          <div class="column-header done-header">
            <h3>Done <span class="badge" id="count-done">0</span></h3>
          </div>
          <div class="task-list" id="list-done"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
