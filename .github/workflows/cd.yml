name: CD Pipeline - Deploy to ECS Fargate

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Amazon ECS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Force ECS Service Deployment
        run: |
          echo "Triggering force-new-deployment on ECS Fargate cluster..."
          aws ecs update-service \
            --cluster devops-task-manager-cluster \
            --service devops-task-manager-service \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION || 'us-east-1' }}
